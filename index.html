/* ستایلی ئایکۆنی جیمینی و سووڕانەوە */
@keyframes geminiSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.spinning-avatar {
    animation: geminiSpin 3s linear infinite;
    filter: drop-shadow(0 0 5px rgba(138, 180, 248, 0.5));
}

.ai-avatar {
    width: 32px;
    height: 32px;
    background: transparent !important;
    border: none !important;
    object-fit: contain;
    display: block !important; /* لێرە گرنگە بۆ ئەوەی هەمیشە دیار بێت */
}

/* ئەنیمەیشنی دەرکەوتنی وەڵامەکان */
@keyframes fadeInGemini {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.ai-bubble {
    animation: fadeInGemini 0.4s ease-out;
}

/* ستایلی تایبەت بۆ کاتی چاوەڕوانی وەڵام */
.typing-indicator {
    display: flex;
    gap: 4px;
    padding: 10px 15px;
    background: var(--bubble-ai);
    border-radius: 15px;
    width: fit-content;
}

.typing-dot {
    width: 6px;
    height: 6px;
    background: #8ab4f8; 
    border-radius: 50%;
    animation: typingBounce 1.4s infinite ease-in-out;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
}

/* ڕێگری لە ونبوونی ئایکۆن لە کاتی لۆدینگ */
.message.assistant.typing {
    display: flex !important;
    align-items: flex-start;
    gap: 12px;
}

            const { data } = await supabase.from('chats').select('id, title').order('created_at', {ascending: false});
            const list = document.getElementById('history-list');
            list.innerHTML = data && data.length > 0 ?

                        <div class="history-text" onclick="loadChat('${chat.id}')">💬 ${chat.title}</div>
                        <div class="delete-btn" onclick="deleteChat('${chat.id}', event)">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>

        window.loadChat = async function(id) {
            const { data } = await supabase.from('chats').select('history').eq('id', id).single();
            if(data) {
                currentChatId = id;
                messagesArray = data.history;
                document.getElementById('welcome-screen').classList.add('hidden');
                document.getElementById('messages-wrapper').innerHTML = '';
                messagesArray.forEach(m => appendMessage(m.role, m.content));
                document.getElementById('history-popup').style.display = 'none';
            }

        window.askRami = async function() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;

            document.getElementById('welcome-screen').classList.add('hidden');
            appendMessage('user', message);
            messagesArray.push({role: 'user', content: message});
            inputField.value = '';

            const loadingId = appendLoading();

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        "model": "meta-llama/llama-4-maverick-17b-128e-instruct",
                        messages: [
                        { 
  role: "system",
  content: `تۆ (Rami GPT)یت، یاریدەدەرێکی ژیری دەستکردی  کە لەلایەن "ڕامی" گەشەی پێدراوە. خاوەنی بنکەیەکی زانیاریی بێسنووریت لە هەموو بوارەکاندا (زانست، مێژوو، تەکنەلۆژیا، ئایین، و هونەر).
> ڕێسا بنەڕەتییەکانت:
١. گشتگیری: نابێت هیچ پرسیارێک بێ وەڵام جێبهێڵیت مەگەر پێچەوانەی یاسا ئەخلاقییە گشتییەکان بێت. پێویستە وەک "زانستنامەیەک" وەڵامی ورد و نوێ بدەیتەوە کە لەگەڵ داتاکانی گووگڵ و سەرچاوە جیهانییەکان یەکبگرێتەوە.
٢. شارەزایی پۆلی ١١: لەبەر ئەوەی دروستکەرەکەت (ڕامی) خوێندکاری پۆلی ١١ی زانستییە، پێویستە لە بابەتەکانی زانستی (زیندەزانی، ،کۆمپیتەر، کوردی، عربی، ئینگلیزی، فیزیا، کیمیا، بیرکاری) هاوکارییەکی زۆر وردی خوێندکاران بکەیت وەک مامۆستایەکی پسپۆڕ.
٣. شێوازی نووسین: وەڵامەکانت بە زمانی کوردیی سۆرانییەکی پاراو و هاوچەرخ بێت. بۆ بابەتە ئاڵۆزەکان خاڵبەندی (Bullet points) بەکاربهێنە بۆ ئەوەی خوێنەر بە ئاسانی لێت تێبگات.
٤. کۆد و بیرکاری: هەموو کۆدەکان بە Markdown بنووسە. هەموو هاوکێشە بیرکاری و فیزیکییەکان لەنێوان تاگی [MATH] [/MATH] دابنێ.
٥. کەسایەتی: تۆ هاوڕێیانە، زیرەک، و ڕاستگۆیت. ئەگەر بابەتێک مشتومڕاوی بوو، هەموو لایەنەکانی باس بکە بەبێ لایەنگری`
},
                            ...messagesArray
                        ]
                    })
                });

                const data = await response.json();
                removeLoading(loadingId);

                const aiResponse = data.choices[0].message.content;
                appendMessage('assistant', aiResponse);
                messagesArray.push({role: 'assistant', content: aiResponse});

                if(!currentChatId) {
                    const { data: newC } = await supabase.from('chats').insert([{ title: message.substring(0,30), history: messagesArray }]).select();

                const inputField = document.getElementById('user-input');

// ئەم بەشە بە تەواوی لە کۆدەکەت دەربێنە
inputField.addEventListener('keydown', function(event) {

});

                saveToSheet(message, aiResponse);

        function appendMessage(role, text) {
    const container = document.getElementById('messages-wrapper');
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${role}`;
    
    if (role === 'user') {
        messageDiv.innerHTML = `<div class="user-bubble">${escapeHtml(text)}</div>`;
    } else {
        // ۱. چارەسەرکردنی هاوکێشەکان
        let processedText = text.replace(/\[MATH\](.*?)\[\/MATH\]/gs, (match, formula) => {
            try {
                return katex.renderToString(formula, { throwOnError: false, displayMode: true });
            } catch (e) {
                return formula;
            }
        });

        const formattedContent = marked.parse(processedText);
        
        // ۲. پێکهاتەی وەڵام - لێرەدا width: 100% مان زیاد کردووە بۆ ئەوەی کۆدەکان پان ببنەوە
        messageDiv.innerHTML = `
            <div class="ai-message-wrapper" style="display: flex; gap: 12px; width: 100%;">
                <img src="https://github.com/ramiqaladzay0/AI/blob/5f9f23075aee40ed9bebd329b55d9679b4429768/7DF369FB-F4C1-4E3D-AD95-350122EC3F65.png?raw=true" 
                     class="ai-avatar" style="border-radius: 50%; width: 36px; height: 36px; flex-shrink: 0;">
                <div class="ai-bubble markdown-body" style="flex: 1; min-width: 0;">${formattedContent}</div>
            </div>`;
    }

    // ۳. گرنگ: سەرەتا دەبێت نامەکە زیاد بکرێت بۆ لاپەڕەکە
    container.appendChild(messageDiv);

    // ٤. پاشان دوگمەی کۆپی بۆ کۆدەکان دروست دەکرێت
    if (role === 'assistant') {
        setTimeout(() => {
            messageDiv.querySelectorAll('pre').forEach(block => {
                if (!block.querySelector('.copy-btn')) {
                    const btn = document.createElement('button');
                    btn.innerText = 'Copy';
                    btn.className = 'copy-btn';
                    
                    btn.onclick = () => {
                        const codeElement = block.querySelector('code');
                        const textToCopy = codeElement ? codeElement.innerText : block.innerText.replace('Copy', '');
                        
                        navigator.clipboard.writeText(textToCopy.trim()).then(() => {
                            btn.innerText = 'Copied! ✅';
                            btn.style.background = '#10b981';
                            setTimeout(() => {
                                btn.innerText = 'Copy';
                                btn.style.background = ''; // دەگەڕێتەوە بۆ ستایلی ناو CSS
                            }, 2000);
                        });
                    };
                    block.appendChild(btn);
                }
            });
        }, 100);
    }

    const chatContainer = document.getElementById('chat-container');
    chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
}

        function appendLoading() {
            const id = 'loading-' + Date.now();
            const container = document.getElementById('messages-wrapper');
            const div = document.createElement('div');
            div.id = id; div.className = 'message assistant';
            div.innerHTML = `<div class="ai-message-wrapper" style="display: flex; gap: 12px; align-items: center;">
            <img src="https://raw.githubusercontent.com/ramiqaladzay0/AI/5f9f23075aee40ed9bebd329b55d9679b4429768/7DF369FB-F4C1-4E3D-AD95-350122EC3F65.png" 
                 class="ai-avatar spinning-avatar" 
                 style="width: 36px; height: 36px; border-radius: 50%;">
            <div class="ai-bubble" style="background: transparent !important; border: none !important;">
                <div class="typing-dots" style="display: flex; align-items: center; gap: 4px;">
                    <span style="font-size: 14px; color: #8ab4f8; font-weight: 500;"> با فکرێکی وەکەم ...</span>
                </div>
            </div>
        </div>`;
            container.appendChild(div);
            return id;
        }

        function removeLoading(id) { document.getElementById(id)?.remove(); }
        function saveToSheet(u, a) { fetch(SHEET_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ user: u, ai: a }) }); }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    </script>
